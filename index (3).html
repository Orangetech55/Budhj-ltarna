<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<title>Budhjältarna – Zonkarta Stockholm</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Barlow',sans-serif;
  background:#0d1520;
  color:#cde;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── TOP BAR ── */
#topbar{
  background:#080e18;
  border-bottom:2px solid rgba(245,200,40,0.35);
  padding:10px 20px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  flex-shrink:0;
  z-index:1000;
}
#topbar h2{
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px;font-weight:900;
  letter-spacing:3px;color:#F8D433;flex:1;
}
.tbtn{
  padding:8px 16px;border-radius:6px;border:none;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:700;letter-spacing:1px;
  transition:all .15s;
}
.tbtn:hover{opacity:.85;transform:translateY(-1px);}
.tbtn-gold{background:#F8D433;color:#1a1000;}
.tbtn-blue{background:#1e3a6e;color:#adf;border:1px solid rgba(100,160,255,0.3);}
.tbtn-green{background:#1a4a2a;color:#afd;border:1px solid rgba(80,200,120,0.3);}
.tbtn-red{background:#4a1a1a;color:#fcc;border:1px solid rgba(255,100,100,0.3);}

/* ── MAIN LAYOUT ── */
#main{
  display:flex;
  flex:1;
  overflow:hidden;
}

/* ── ADMIN PANEL ── */
#admin{
  width:320px;
  min-width:320px;
  background:#0a1220;
  border-right:1px solid rgba(60,100,180,0.25);
  overflow-y:auto;
  flex-shrink:0;
}
#admin::-webkit-scrollbar{width:4px;}
#admin::-webkit-scrollbar-track{background:#0a1220;}
#admin::-webkit-scrollbar-thumb{background:#2a4a80;border-radius:2px;}

.admin-section{
  padding:14px 16px;
  border-bottom:1px solid rgba(60,100,180,0.15);
}
.admin-section h3{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;
  letter-spacing:3px;
  color:rgba(120,160,240,0.65);
  text-transform:uppercase;
  margin-bottom:10px;
}

.field{
  display:flex;align-items:center;gap:8px;margin-bottom:7px;
}
.field label{
  font-size:12px;color:rgba(150,190,255,0.7);
  width:115px;flex-shrink:0;
}
.field input[type=text],
.field input[type=number],
.field select{
  flex:1;background:rgba(255,255,255,0.05);
  border:1px solid rgba(60,100,180,0.30);
  border-radius:4px;color:#dde8ff;
  font-family:'Barlow',sans-serif;font-size:12px;
  padding:4px 8px;
}
.field input[type=range]{
  flex:1;accent-color:#F8D433;height:3px;cursor:pointer;
}
.field .val{
  font-size:11px;color:rgba(160,200,255,0.6);
  width:28px;text-align:right;flex-shrink:0;
}

/* Zone rows */
.zone-row{
  display:flex;align-items:center;gap:8px;
  margin-bottom:6px;
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:6px;padding:7px 8px;
}
.z-swatch{
  width:20px;height:20px;border-radius:4px;
  border:2px solid rgba(255,255,255,0.25);
  cursor:pointer;flex-shrink:0;
  transition:transform .15s;
}
.z-swatch:hover{transform:scale(1.2);}
.cp-hidden{position:absolute;opacity:0;width:0;height:0;pointer-events:none;}
.z-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:700;color:#fff;
  width:58px;flex-shrink:0;
}
.z-op-slider{flex:1;accent-color:#F8D433;height:3px;}
.z-op-val{font-size:11px;color:rgba(160,200,255,0.6);width:24px;text-align:right;}

/* Label editor */
.label-edit{
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:6px;padding:8px;margin-bottom:6px;
}
.label-edit-head{
  display:flex;align-items:center;gap:6px;margin-bottom:5px;
}
.label-edit-head .dot{width:12px;height:12px;border-radius:3px;}
.label-edit-head span{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;color:rgba(255,255,255,0.85);
}
.label-edit input{
  width:100%;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(60,100,180,0.25);
  border-radius:4px;color:#dde8ff;
  font-size:12px;padding:4px 7px;
  margin-bottom:3px;
  font-family:'Barlow',sans-serif;
}
.label-edit input:last-child{margin-bottom:0;}

.bstyle-btns{display:flex;gap:5px;flex-wrap:wrap;}
.bs-btn{
  padding:3px 10px;border-radius:4px;
  border:1px solid rgba(60,100,180,0.30);
  background:rgba(255,255,255,0.04);
  color:#9ab;font-size:11px;cursor:pointer;
}
.bs-btn.active{
  background:rgba(248,212,51,0.12);
  border-color:#F8D433;color:#F8D433;
}

/* ── MAP CONTAINER ── */
#map-wrap{
  flex:1;
  position:relative;
  overflow:hidden;
}

#map{
  width:100%;height:100%;
}

/* Zone overlay labels on map */
.zone-div-label{
  pointer-events:none;
  text-align:center;
  transform:translate(-50%,-50%);
}
.zdl-code{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  letter-spacing:1px;
  line-height:1;
  -webkit-text-stroke:5px rgba(5,8,12,0.88);
  paint-order:stroke fill;
  text-shadow:0 2px 12px rgba(0,0,0,0.9);
}
.zdl-sub{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:600;
  color:rgba(255,255,255,0.92);
  -webkit-text-stroke:3px rgba(5,8,12,0.85);
  paint-order:stroke fill;
  text-shadow:0 1px 8px rgba(0,0,0,0.95);
  white-space:nowrap;
}

/* Map header overlay */
#map-header{
  position:absolute;
  top:0;left:0;right:0;
  z-index:500;
  background:linear-gradient(180deg,rgba(8,14,24,0.97) 0%,rgba(8,14,24,0.88) 75%,transparent 100%);
  padding:14px 20px 28px;
  pointer-events:none;
}
#map-header h1{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  letter-spacing:6px;
  color:#F8D433;
  text-shadow:3px 4px 0 rgba(100,60,0,0.45);
  line-height:1;
}
#map-header p{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:600;
  letter-spacing:4px;
  color:rgba(160,200,255,0.82);
  font-style:italic;
}
#map-header .gold-rule{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(248,212,51,0.4),transparent);
  margin-top:5px;
}

/* Legend overlay */
#legend-overlay{
  position:absolute;
  bottom:30px;left:22px;
  z-index:500;
  background:rgba(8,14,24,0.91);
  border:1.5px solid rgba(100,150,230,0.38);
  border-radius:12px;
  padding:16px 20px;
  backdrop-filter:blur(6px);
  min-width:340px;
}
#legend-overlay h4{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:900;
  letter-spacing:3px;
  color:rgba(160,200,255,0.95);
  margin-bottom:8px;
  padding-bottom:6px;
  border-bottom:1px solid rgba(100,150,230,0.22);
}
.leg-row{
  display:flex;align-items:center;gap:9px;margin-bottom:5px;
}
.leg-sw{
  width:18px;height:18px;border-radius:3px;
  border:1.5px solid rgba(255,255,255,0.2);
  flex-shrink:0;
}
.leg-zn{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;color:white;
  width:58px;
}
.leg-desc{
  font-size:12px;color:rgba(170,200,255,0.80);
  font-family:'Barlow',sans-serif;
}

/* Compass */
#compass-overlay{
  position:absolute;top:20px;right:20px;
  z-index:500;width:72px;height:72px;
}

/* Zoom controls */
.leaflet-control-zoom{
  border:none !important;
  box-shadow:0 2px 12px rgba(0,0,0,0.5) !important;
}
.leaflet-control-zoom a{
  background:rgba(8,14,24,0.92) !important;
  color:#adf !important;
  border:1px solid rgba(60,100,180,0.35) !important;
  font-size:16px !important;
}

/* Export canvas (hidden) */
#export-canvas{display:none;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h2>🗺 BUDHJÄLTARNA — ZONKARTA EDITOR</h2>
  <button class="tbtn tbtn-blue"  onclick="map.setView([59.334,18.065],11)">⌂ Återställ vy</button>
  <button class="tbtn tbtn-green" onclick="exportSVG()">⬇ SVG (Illustrator)</button>
  <button class="tbtn tbtn-gold"  onclick="exportPNG()">⬇ PNG (Print-ready)</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- ADMIN PANEL -->
  <div id="admin">

    <!-- Title -->
    <div class="admin-section">
      <h3>Titel &amp; Rubrik</h3>
      <div class="field">
        <label>Titel</label>
        <input type="text" id="cfg-title" value="BUDHJÄLTARNA" oninput="updateHeader()"/>
      </div>
      <div class="field">
        <label>Undertitel</label>
        <input type="text" id="cfg-sub" value="ZONKARTA · STOCKHOLM · PREMIUM BUDTJÄNST" oninput="updateHeader()"/>
      </div>
      <div class="field">
        <label>Titelstorlek</label>
        <input type="range" id="cfg-ts" min="24" max="80" value="48" oninput="syncVal(this,'lbl-ts');updateHeader()"/>
        <span class="val" id="lbl-ts">48</span>
      </div>
      <div class="field">
        <label>Visa rubrik</label>
        <select id="cfg-sh" onchange="updateHeader()">
          <option value="1">Ja</option><option value="0">Nej</option>
        </select>
      </div>
    </div>

    <!-- Zone opacity -->
    <div class="admin-section">
      <h3>Zonopacitet (overlay)</h3>
      <div id="zone-op-rows"></div>
    </div>

    <!-- Zone colors -->
    <div class="admin-section">
      <h3>Zonfärger (klicka för att ändra)</h3>
      <div id="zone-color-rows"></div>
    </div>

    <!-- Border -->
    <div class="admin-section">
      <h3>Zonkanter</h3>
      <div class="field">
        <label>Kantbredd</label>
        <input type="range" id="cfg-sw" min="1" max="10" value="3" oninput="syncVal(this,'lbl-sw');rebuildZones()"/>
        <span class="val" id="lbl-sw">3</span>
      </div>
      <div class="field">
        <label>Kantopacitet</label>
        <input type="range" id="cfg-so" min="0" max="100" value="85" oninput="syncVal(this,'lbl-so');rebuildZones()"/>
        <span class="val" id="lbl-so">85</span>
      </div>
      <div class="field" style="align-items:flex-start;">
        <label style="margin-top:2px;">Kantstil</label>
        <div class="bstyle-btns" id="bstyle-btns">
          <button class="bs-btn active" onclick="setBStyle('solid',this)">Solid</button>
          <button class="bs-btn" onclick="setBStyle('dashed',this)">Dashed</button>
          <button class="bs-btn" onclick="setBStyle('dotted',this)">Dotted</button>
        </div>
      </div>
    </div>

    <!-- Labels -->
    <div class="admin-section">
      <h3>Etiketter på kartan</h3>
      <div class="field">
        <label>Zonetikettstorlek</label>
        <input type="range" id="cfg-zls" min="14" max="52" value="28" oninput="syncVal(this,'lbl-zls');rebuildLabels()"/>
        <span class="val" id="lbl-zls">28</span>
      </div>
      <div class="field">
        <label>Visa undertextzon</label>
        <select id="cfg-zsub" onchange="rebuildLabels()">
          <option value="1">Ja</option><option value="0">Nej</option>
        </select>
      </div>
    </div>

    <!-- Legend -->
    <div class="admin-section">
      <h3>Legend</h3>
      <div class="field">
        <label>Visa legend</label>
        <select id="cfg-leg" onchange="updateLegend()">
          <option value="1">Ja</option><option value="0">Nej</option>
        </select>
      </div>
      <div class="field">
        <label>Legendrubrik</label>
        <input type="text" id="cfg-leg-title" value="ZONINDELNING — STOCKHOLM" oninput="updateLegend()"/>
      </div>
    </div>

    <!-- Zone label text editor -->
    <div class="admin-section">
      <h3>Redigera zonetiketter</h3>
      <div id="label-edit-rows"></div>
    </div>

  </div>

  <!-- MAP -->
  <div id="map-wrap">
    <!-- Map header overlay -->
    <div id="map-header">
      <h1 id="mh-title">BUDHJÄLTARNA</h1>
      <p id="mh-sub">ZONKARTA · STOCKHOLM · PREMIUM BUDTJÄNST</p>
      <div class="gold-rule"></div>
    </div>

    <!-- Leaflet map -->
    <div id="map"></div>

    <!-- Compass -->
    <svg id="compass-overlay" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
      <circle cx="36" cy="36" r="34" fill="rgba(8,14,24,0.88)" stroke="rgba(100,150,230,0.5)" stroke-width="1.5"/>
      <polygon points="36,6 29,38 43,38" fill="#e03030"/>
      <polygon points="36,66 29,38 43,38" fill="#666"/>
      <text x="36" y="4" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-size="14" font-weight="900" fill="white">N</text>
    </svg>

    <!-- Legend -->
    <div id="legend-overlay">
      <h4 id="leg-title">ZONINDELNING — STOCKHOLM</h4>
      <div id="leg-rows"></div>
    </div>
  </div>

</div>

// STATE
// ═══════════════════════════════════════════════════════
const S = {
  zoneOpacity: Object.fromEntries(Object.keys(ZONE_DEFS).map(k=>[k,0.18])),
  zoneColors:  Object.fromEntries(Object.entries(ZONE_DEFS).map(([k,v])=>[k,v.color])),
  zoneLabels:  Object.fromEntries(Object.entries(ZONE_DEFS).map(([k,v])=>[k,v.label])),

  zoneLabelSize: 28,
  showZoneSub: true,
};

// ═══════════════════════════════════════════════════════
// LEAFLET MAP SETUP
// ═══════════════════════════════════════════════════════
const map = L.map('map',{
  center:[59.334,18.065],
  zoom:11,
  zoomControl:true,
  attributionControl:true,
});

// TomTom-style tiles (matching the screenshot exactly)
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'©OpenStreetMap ©Carto',
  subdomains:'abcd',
  maxZoom:19,
}).addTo(map);

// ═══════════════════════════════════════════════════════
// ZONE POLYGONS
// ═══════════════════════════════════════════════════════
const zoneLayers = {};
const zoneOrder = ['ZON5','ZON4N','ZON4S','ZON3N','ZON3S','ZON2N','ZON2S','ZON1'];

function hexToRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function dashArray() {
  if(S.strokeDash==='dashed') return '12 8';
  if(S.strokeDash==='dotted') return '3 6';
  return null;
}

function rebuildZones() {
  // Remove existing
  for(const k of Object.keys(zoneLayers)){
    if(zoneLayers[k]) map.removeLayer(zoneLayers[k]);
  }
  for(const key of zoneOrder){
    const def = ZONE_DEFS[key];
    const color = S.zoneColors[key];
    const op = S.zoneOpacity[key];
    const latlngs = def.coords.map(([lat,lng])=>L.latLng(lat,lng));
    const poly = L.polygon(latlngs,{
      fillColor: color,
      fillOpacity: op,
      color: color,
      weight: S.strokeWidth,
      opacity: S.strokeOpacity,
      dashArray: dashArray(),
      lineCap:'round',
      lineJoin:'round',
    });
    poly.addTo(map);
    zoneLayers[key] = poly;
  }
}

// ═══════════════════════════════════════════════════════
// ZONE LABELS (DivIcon)
// ═══════════════════════════════════════════════════════
const labelMarkers = {};

function rebuildLabels() {
  for(const k of Object.keys(labelMarkers)){
    if(labelMarkers[k]) map.removeLayer(labelMarkers[k]);
  }
  const fs = +document.getElementById('cfg-zls').value;
  const showSub = document.getElementById('cfg-zsub').value==='1';

  for(const [key, def] of Object.entries(ZONE_DEFS)){
    const color = S.zoneColors[key];
    const code  = S.zoneLabels[key];
    const sub   = S.zoneSubs[key];

    const html = `
      <div class="zone-div-label">
        <div class="zdl-code" style="font-size:${fs}px;color:${color};">${code}</div>
        ${showSub ? `<div class="zdl-sub" style="font-size:${Math.round(fs*0.52)}px;">${sub}</div>` : ''}
      </div>`;

    const icon = L.divIcon({
      html,
      className:'',
      iconSize:[220,60],
      iconAnchor:[110,30],
    });
    const m = L.marker(def.latlng,{icon,interactive:false,zIndexOffset:1000});
    m.addTo(map);
    labelMarkers[key]=m;
  }
}

function updateHeader() {

function updateLegend() {
  const show = document.getElementById('cfg-leg').value==='1';
  const title = document.getElementById('cfg-leg-title').value;
  document.getElementById('legend-overlay').style.display = show ? '' : 'none';
  document.getElementById('leg-title').textContent = title;

function buildLegendRows() {
  const el = document.getElementById('leg-rows');
  el.innerHTML = LEGEND_ROWS.map(([key,zn,desc])=>`
    <div class="leg-row">
      <div class="leg-sw" id="lsw-${key}" style="background:${S.zoneColors[key]};border-color:${S.zoneColors[key]};"></div>
      <span class="leg-zn">${zn}</span>
      <span class="leg-desc">${desc}</span>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════
// BUILD ADMIN CONTROLS
// ═══════════════════════════════════════════════════════
function buildAdminControls() {
  const opDiv    = document.getElementById('zone-op-rows');
  const colorDiv = document.getElementById('zone-color-rows');
  const labelDiv = document.getElementById('label-edit-rows');

  for(const [key, def] of Object.entries(ZONE_DEFS)){
    // Opacity row
    opDiv.innerHTML += `
      <div class="zone-row">
        <div class="z-swatch" id="sw-${key}" style="background:${def.color}" onclick="document.getElementById('cp-${key}').click()"></div>
        <input type="color" class="cp-hidden" id="cp-${key}" value="${def.color}"
          onchange="S.zoneColors['${key}']=this.value; document.getElementById('sw-${key}').style.background=this.value; document.getElementById('sw2-${key}').style.background=this.value; rebuildZones(); rebuildLabels(); buildLegendRows();"/>
        <span class="z-name">${def.label}</span>
        <input type="range" class="z-op-slider" min="0" max="50" value="18"
          oninput="S.zoneOpacity['${key}']=+this.value/100; document.getElementById('ov-${key}').textContent=this.value; rebuildZones()"/>
        <span class="z-op-val" id="ov-${key}">18</span>
      </div>`;

    // Color row (duplicate for color section)
    colorDiv.innerHTML += `
      <div class="zone-row" style="cursor:pointer" onclick="document.getElementById('cp-${key}').click()">
        <div class="z-swatch" id="sw2-${key}" style="background:${def.color}"></div>
        <span class="z-name">${def.label}</span>
        <span style="font-size:11px;color:rgba(160,200,255,0.5);margin-left:auto;">${def.color}</span>
      </div>`;

    // Label editor
    labelDiv.innerHTML += `
      <div class="label-edit">
        <div class="label-edit-head">
          <div class="dot" style="background:${def.color}"></div>
          <span>${def.label}</span>
        </div>
        <input type="text" value="${def.label}" placeholder="Kodetikett"
          oninput="S.zoneLabels['${key}']=this.value; rebuildLabels()"/>
        <input type="text" value="${def.sub}" placeholder="Orter..."
          oninput="S.zoneSubs['${key}']=this.value; rebuildLabels()"/>
      </div>`;
  }
}

function setBStyle(s,btn){
  S.strokeDash=s;
  document.querySelectorAll('.bs-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  rebuildZones();
}
function syncVal(el,id){
  document.getElementById(id).textContent=el.value;

  S.strokeOpacity=+document.getElementById('cfg-so').value/100;
}

// ═══════════════════════════════════════════════════════
// EXPORT SVG
// ═══════════════════════════════════════════════════════
function exportSVG(){
  // Build a standalone SVG with all zone data
  const W=2400,H=1700;
  const LAT0=59.66,LAT1=59.14,LNG0=17.45,LNG1=18.85;
  const MX0=0,MY0=160,MW=W,MH=H-160;

  function gp(lat,lng){
    const x=MX0+(lng-LNG0)/(LNG1-LNG0)*MW;
    const y=MY0+(lat-LAT0)/(LAT1-LAT0)*MH;
    return [x.toFixed(1),y.toFixed(1)];
  }

  let paths='';
  let labels='';

  for(const key of zoneOrder){
    const def=ZONE_DEFS[key];
    const color=S.zoneColors[key];
    const op=S.zoneOpacity[key];
    const pts=def.coords.map(([lat,lng])=>gp(lat,lng).join(',')).join(' ');
    const dash=S.strokeDash==='dashed'?'stroke-dasharray="12 8"':S.strokeDash==='dotted'?'stroke-dasharray="3 6"':'';
    paths+=`<polygon id="${key}" points="${pts}" fill="${color}" fill-opacity="${op.toFixed(2)}" stroke="${color}" stroke-width="${S.strokeWidth}" stroke-opacity="${S.strokeOpacity.toFixed(2)}" stroke-linejoin="round" ${dash}/>\n`;

    const [lx,ly]=gp(...def.latlng);
    const code=S.zoneLabels[key];
    const sub=S.zoneSubs[key];
    const fs=+document.getElementById('cfg-zls').value*1.5;
    labels+=`<text x="${lx}" y="${ly}" text-anchor="middle" font-size="${fs}" font-weight="900" font-family="'Barlow Condensed',Arial Narrow,sans-serif" fill="${color}" paint-order="stroke" stroke="rgba(5,8,12,0.92)" stroke-width="${fs*0.28}">${code}</text>\n`;
    labels+=`<text x="${lx}" y="${+ly+fs*0.7}" text-anchor="middle" font-size="${fs*0.52}" font-weight="600" font-family="'Barlow Condensed',Arial Narrow,sans-serif" fill="rgba(255,255,255,0.95)" paint-order="stroke" stroke="rgba(5,8,12,0.88)" stroke-width="${fs*0.18}">${sub}</text>\n`;
  }

  const title=document.getElementById('cfg-title').value;
  const subTxt=document.getElementById('cfg-sub').value;

  const svg=`<?xml version="1.0" encoding="UTF-8"?>
<!-- BUDHJÄLTARNA Zonkarta – Adobe Illustrator SVG (A5 Landscape) -->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#d4e8c4"/>
    <stop offset="1" stop-color="#c8e0b8"/>
  </linearGradient>
  <filter id="ds"><feDropShadow dx="2" dy="3" stdDeviation="6" flood-opacity="0.3"/></filter>
</defs>
<!-- Background (land) -->
<rect width="${W}" height="${H}" fill="url(#bg)"/>
<!-- Map area placeholder note: open in Illustrator and place actual map tile behind zone group -->
<rect x="0" y="${160}" width="${W}" height="${H-160}" fill="#d4e8c0" opacity="0.4"/>
<!-- ZONES -->
<g id="zone-overlays">
${paths}</g>
<!-- ZONE LABELS -->
<g id="zone-labels">
${labels}</g>
<!-- HEADER -->
<rect x="0" y="0" width="${W}" height="160" fill="#080e18"/>
<line x1="0" y1="160" x2="${W}" y2="160" stroke="rgba(248,212,51,0.4)" stroke-width="2"/>
<text x="${W/2}" y="100" text-anchor="middle" font-size="80" font-weight="900" font-family="'Barlow Condensed',Arial Narrow,sans-serif" letter-spacing="6" fill="#F8D433" filter="url(#ds)">${title}</text>
<text x="${W/2}" y="142" text-anchor="middle" font-size="26" font-family="'Barlow Condensed',Arial Narrow,sans-serif" letter-spacing="4" fill="rgba(160,200,255,0.82)" font-style="italic">${subTxt}</text>
<!-- FRAME -->
<rect x="5" y="5" width="${W-10}" height="${H-10}" fill="none" stroke="#1c2a3f" stroke-width="12"/>
<rect x="16" y="16" width="${W-32}" height="${H-32}" fill="none" stroke="rgba(248,212,51,0.28)" stroke-width="2"/>
</svg>`;

  const blob=new Blob([svg],{type:'image/svg+xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='budhjaltarna_zonkarta.svg';
  a.click();
}
